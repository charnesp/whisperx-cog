apiVersion: v1
kind: Secret
metadata:
  name: bridge-auth-secret
type: Opaque
stringData:
  BRIDGE_TOKEN: "TOKEN"
  WEBHOOK_SECRET: "SECRET"


---
apiVersion: v1
kind: Secret
metadata:
  name: hf-secret
type: Opaque
stringData:
  HUGGINGFACE_TOKEN: "TOKEN"


---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whisperx-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whisperx
  template:
    metadata:
      labels:
        app: whisperx
    spec:
      containers:
      # 1. WHISPERX (COG)
      - name: whisperx
        image: ghcr.io/charnesp/whisperx-cog:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        resources:
          limits:
            nvidia.com/gpu: 1
            memory: "12Gi"
            cpu: "4"
        env:
          - name: HUGGINGFACE_TOKEN
            valueFrom:
              secretKeyRef:
                name: hf-secret
                key: HUGGINGFACE_TOKEN

      # 2. REDIS
      - name: redis
        image: redis:alpine

      # 3. BRIDGE
      - name: bridge
        image: ghcr.io/charnesp/whisperx-cog-bridge:latest
        imagePullPolicy: Always
        env:
          - name: BRIDGE_AUTH_TOKEN
            valueFrom:
              secretKeyRef:
                name: bridge-auth-secret
                key: BRIDGE_TOKEN
          - name: WEBHOOK_SECRET
            valueFrom:
              secretKeyRef:
                name: bridge-auth-secret
                key: WEBHOOK_SECRET
          - name: OPENAI_STT_TIMEOUT_SECONDS
            value: "300"
          - name: OPENAI_STT_MAX_FILE_SIZE_MB
            value: "25"
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
        readinessProbe:
          httpGet:
            path: /health-check
            port: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: whisperx-service
spec:
  selector:
    app: whisperx
  ports:
    - name: api
      port: 5000
      targetPort: 5000
    - name: bridge
      port: 8080
      targetPort: 8080
