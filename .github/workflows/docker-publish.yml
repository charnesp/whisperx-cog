# Build the Cog Docker image and push to GitHub Container Registry (GHCR)
# https://docs.github.com/en/packages/working-with-a-github-packages-registry/working-with-the-container-registry

name: Build and push Docker image

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /usr/share/swift /usr/local/.ghcup || true
          docker system prune -af || true
          df -h

      - name: Setup Cog
        uses: replicate/setup-cog@v2
        with:
          token: ""  # do not authenticate to Replicate; we only push to GHCR
          cog-version: "v0.16.12"

      # Use default builder (docker driver) so the image is loaded locally for docker push
      - name: Use default Docker builder
        run: docker buildx use default

      - name: Set image name (lowercase for GHCR)
        run: echo "IMAGE_NAME=${{ env.REGISTRY }}/$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image with Cog
        run: cog build --progress=plain -t ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Verify baked models in image
        run: |
          docker run --rm --entrypoint bash ${{ env.IMAGE_NAME }}:${{ github.sha }} -c '
            set -euo pipefail
            test -s /models/faster-whisper-large-v3-turbo/model.bin
            ls -lh /models/faster-whisper-large-v3-turbo/model.bin
          '

      - name: Tag image as latest
        run: docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest

      - name: Push image to GHCR
        run: |
          docker push ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
