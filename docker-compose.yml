# Docker Compose equivalent of k8s/whisperx-stack.yaml
#
# Like the Kubernetes pod, whisperx and redis share the bridge container's
# network namespace (127.0.0.1) so the bridge script can reach Cog and Redis
# on localhost without configuration changes.
#
# Prerequisites:
#   - Docker Compose v2 with NVIDIA Container Toolkit (for GPU)
#   - Copy .env.example to .env and set secrets
#
# Usage:
#   docker compose up -d
#   curl http://localhost:8080/health
#   curl -H "Authorization: Bearer $BRIDGE_TOKEN" http://localhost:8080/health-check
#
# Bridge image: ghcr.io/charnesp/whisperx-cog-bridge:latest (built by GitHub Actions)

services:
  bridge:
    image: ghcr.io/charnesp/whisperx-cog-bridge:latest
    pull_policy: always
    environment:
      BRIDGE_AUTH_TOKEN: ${BRIDGE_TOKEN}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      OPENAI_STT_TIMEOUT_SECONDS: ${OPENAI_STT_TIMEOUT_SECONDS:-300}
      OPENAI_STT_MAX_FILE_SIZE_MB: ${OPENAI_STT_MAX_FILE_SIZE_MB:-25}
    ports:
      - "${BRIDGE_PORT:-8080}:8080"
      - "${COG_PORT:-5000}:5000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  whisperx:
    image: ghcr.io/charnesp/whisperx-cog:latest
    pull_policy: always
    network_mode: "service:bridge"
    depends_on:
      bridge:
        condition: service_started
    environment:
      HUGGINGFACE_TOKEN: ${HUGGINGFACE_TOKEN}
    gpus: all
    deploy:
      resources:
        limits:
          memory: 12G
          cpus: "4"

  redis:
    image: redis:alpine
    network_mode: "service:bridge"
    depends_on:
      bridge:
        condition: service_started
